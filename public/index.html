<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Hub Obfuscator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --orange: #ff6b00;
    --orange2: #ff9340;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --green: #22c55e;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  header h1 span { color: var(--orange); }

  .badge {
    margin-left: auto;
    font-size: 11px;
    background: rgba(255,107,0,0.12);
    color: var(--orange2);
    border: 1px solid rgba(255,107,0,0.25);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .mode-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .mode-btn {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .mode-btn.active {
    background: var(--orange);
    color: #fff;
  }

  .mode-btn:hover:not(.active) { color: var(--text); }

  .upload-btn {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
  }
  .upload-btn:hover { border-color: var(--orange); }

  #fileInput { display: none; }

  .obf-btn {
    margin-left: auto;
    padding: 8px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: #fff;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .obf-btn:hover { opacity: 0.9; }
  .obf-btn:active { transform: scale(0.97); }
  .obf-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .editors {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }

  .editor-box {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .editor-label {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }

  .copy-btn {
    margin-left: auto;
    padding: 3px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 5px;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--orange); color: var(--orange); }

  textarea {
    flex: 1;
    min-height: 420px;
    padding: 16px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
  }

  textarea::placeholder { color: var(--muted); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 0;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }
  .status-dot.loading {
    background: var(--orange);
    animation: pulse 0.8s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
    font-size: 11px;
  }

  .stat { color: var(--muted); }
  .stat span { color: var(--text); font-weight: 500; }

  .mode-info {
    padding: 10px 16px;
    background: rgba(255,107,0,0.05);
    border: 1px solid rgba(255,107,0,0.15);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .mode-info b { color: var(--orange2); }

  @media (max-width: 768px) {
    main { padding: 16px; }
    header { padding: 16px; }
    .editors { grid-template-columns: 1fr; }
    .obf-btn { margin-left: 0; width: 100%; }
    .controls { gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔒</div>
  <h1>Orange Hub <span>Obfuscator</span></h1>
  <div class="badge">LUA / ROBLOX</div>
</header>

<main>
  <div class="mode-info" id="modeInfo">
    <b>Light Mode</b> — String encryption (8-byte XOR key), variable renaming. Nhanh, tương thích mọi executor.
  </div>

  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('light')">⚡ Light</button>
      <button class="mode-btn" onclick="setMode('heavy')">🔥 Heavy</button>
    </div>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📂 Upload .lua</button>
    <input type="file" id="fileInput" accept=".lua,.txt" onchange="loadFile(this)">
    <button class="obf-btn" id="obfBtn" onclick="obfuscate()">Obfuscate →</button>
  </div>

  <div class="editors">
    <div class="editor-box">
      <div class="editor-label">
        <div class="dot"></div>
        Input — Lua Source
      </div>
      <textarea id="input" placeholder="-- Paste Lua code here...&#10;&#10;local Players = game:GetService(&quot;Players&quot;)&#10;local player = Players.LocalPlayer&#10;print(&quot;Hello, &quot; .. player.Name)"></textarea>
    </div>
    <div class="editor-box">
      <div class="editor-label">
        <div class="dot"></div>
        Output — Obfuscated
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
        <button class="copy-btn" onclick="downloadOutput()">⬇ Download</button>
      </div>
      <textarea id="output" readonly placeholder="-- Output will appear here..."></textarea>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
    <div class="stats">
      <div class="stat">Input: <span id="inputSize">0</span> chars</div>
      <div class="stat">Output: <span id="outputSize">0</span> chars</div>
      <div class="stat">Time: <span id="elapsed">—</span></div>
    </div>
  </div>
</main>

<script>
let currentMode = 'light';

const modeInfo = {
  light: '<b>Light Mode</b> — String encryption (8-byte XOR key), variable renaming. Nhanh, tương thích mọi executor.',
  heavy: '<b>Heavy Mode</b> — Triple-layer XOR (32+16+8 byte keys), dynamic key derivation, chunked decode. Tương thích Roblox, không dùng table.unpack.'
};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && mode === 'light') || (i === 1 && mode === 'heavy'));
  });
  document.getElementById('modeInfo').innerHTML = modeInfo[mode];
}

function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('input').value = e.target.result;
    updateInputSize();
  };
  reader.readAsText(file);
  input.value = '';
}

function updateInputSize() {
  const len = document.getElementById('input').value.length;
  document.getElementById('inputSize').textContent = len.toLocaleString();
}

document.getElementById('input').addEventListener('input', updateInputSize);

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
  document.getElementById('statusText').textContent = text;
}

async function obfuscate() {
  const code = document.getElementById('input').value.trim();
  if (!code) { setStatus('err', 'No input code'); return; }

  const btn = document.getElementById('obfBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  setStatus('loading', 'Obfuscating...');
  document.getElementById('output').value = '';
  document.getElementById('outputSize').textContent = '0';
  document.getElementById('elapsed').textContent = '—';

  const t0 = Date.now();

  try {
    const res = await fetch('/obfuscate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, mode: currentMode })
    });
    const data = await res.json();
    const elapsed = Date.now() - t0;

    if (data.error) throw new Error(data.error);

    document.getElementById('output').value = data.obfuscated;
    document.getElementById('outputSize').textContent = data.obfuscated.length.toLocaleString();
    document.getElementById('elapsed').textContent = elapsed + 'ms';
    setStatus('ok', 'Done');
  } catch (e) {
    setStatus('err', 'Error: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Obfuscate →';
}

function downloadOutput() {
  const out = document.getElementById('output').value;
  if (!out) return;
  const blob = new Blob([out], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'obfuscated.lua';
  a.click();
  URL.revokeObjectURL(url);
}

function copyOutput() {
  const out = document.getElementById('output').value;
  if (!out) return;
  navigator.clipboard.writeText(out).then(() => {
    setStatus('ok', 'Copied to clipboard!');
    setTimeout(() => setStatus('', 'Ready'), 2000);
  });
}
</script>
</body>
        </html>
